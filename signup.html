<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta property="og:title" content="Orbo Signin">
    <meta property="og:description" content="A way to be together!">
    <meta property="og:image" content="https://data.orbinuity.nl/orbo/logo.png">
    <meta name="description" content="A way to be together!">
    <meta name="generator" content="Github">
    <meta name="author" content="Orbinuity">
    <meta name="keywords" content="Orbinuity, website, tech, software, hartware, company, Orbo">
    <meta name="robots" content="index, follow">
    <link rel="icon" href="https://data.orbinuity.nl/orbo/logo.png" type="image/png">
    <title>Orbo - Sign in</title>
    <script src="https://www.google.com/recaptcha/api.js" async defer></script>
    <link rel="stylesheet" href="https://orbinuity.nl/style.css">
    <link rel="stylesheet" href="/style.css">
</head>
<body>

<div id="header"></div>

<main class="container">
    <h1>Sign in</h1>
    <section>
        <div class="card">
            <form id="signupForm">
                <label for="username">Username:</label>
                <input type="text" id="username" required>
            
                <label for="email">Email:</label>
                <input type="email" id="email" required>
            
                <label for="password">Password:</label>
                <input type="password" id="password" required>
            
                <label for="name">Name:</label>
                <input type="text" id="name" required>
            
                <div class="g-recaptcha" data-sitekey="6LeoYr8sAAAAAMw0ZUfqk05sZr74lggQxnvE7XG7"></div>

                <p style="color: var(--dark-text);">By creating an account or using Orbo, you agree to the <a href="/service">Terms of Service</a> and <a href="/privacy">Privacy Policy</a>!</p>
            
                <button type="submit">Create Account</button>
            </form>
        
            <p id="statusMessage"></p>
        </div>
    </section>
</main>

<div id="footer"></div>

<script src="https://orbinuity.nl/script.js"></script>
<script src="/checkServer.js"></script>
<script src="/signup.js"></script>
<script src="/index.js"></script>

</body>
</html>
